<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">

    <main id="playing-cards">
        <div class="card">
            <div class="left">A♠</div>
            <div class="middle"><span>♠</span><span>♠</span></div>
            <div class="right">A♠</div>

        <div class="card">
            <div class="left">K♥</div>
            <div class="middle"><span>♥</span><span>♥</span></div>

        <div class="card">
            <div class="left">Q♦</div>
            <div class="middle"><span>♦</span><span>♦</span></div>
            <div class="right">Q♦</div>
        </div>
    </main>

</body>
</html>
